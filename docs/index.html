<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>投棄信託ダービー</title>
  <link rel="stylesheet" href="./style_fhd.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: #333;
    }

    .landing {
      max-width: 960px;
      width: 100%;
      text-align: center;
    }

    .landing-title {
      font-size: 3rem;
      font-weight: 800;
      color: #4a69bd;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .landing-subtitle {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 52px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 28px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 28px 32px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 36px rgba(0,0,0,0.14), 0 6px 10px rgba(0,0,0,0.09);
    }

    .card-icon {
      font-size: 3rem;
      line-height: 1;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #222;
    }

    .card-desc {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.6;
    }

    .card-btn {
      display: inline-block;
      margin-top: 6px;
      padding: 12px 32px;
      background: #4a69bd;
      color: #fff;
      text-decoration: none;
      border-radius: 9px;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.15s ease;
    }

    .card-btn:hover {
      background: #3a58a8;
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1 class="landing-title">投棄信託ダービー</h1>
    <p class="landing-subtitle">どのレースを観戦しますか？</p>
    <div class="card-grid">
      <div class="card">
        <div class="card-icon">🏁</div>
        <div class="card-title">最新1ヶ月</div>
        <p class="card-desc">直近1ヶ月間の価格推移で<br>10本のファンドが激走</p>
        <a class="card-btn" href="./race.html?range=1m">観戦する →</a>
      </div>
      <div class="card">
        <div class="card-icon">📊</div>
        <div class="card-title">最新4半期</div>
        <p class="card-desc">直近3ヶ月間（1四半期）の<br>価格推移でレース</p>
        <a class="card-btn" href="./race.html?range=3m">観戦する →</a>
      </div>
      <div class="card">
        <div class="card-icon">🏆</div>
        <div class="card-title">全期間</div>
        <p class="card-desc">2025年9月〜現在の全データ<br>6ヶ月超の総集編レース</p>
        <a class="card-btn" href="./race.html?range=all">観戦する →</a>
      </div>
    </div>
  </div>
</body>
</html>
