<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>VT Chase - 前月比較</title>
  <script src="./chase-utils.js"></script>
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #f3fff5 0%, #d9f4df 100%);
      font-family: 'Noto Sans JP', sans-serif;
    }

    .slide {
      width: 1920px;
      height: 1080px;
      margin: 0 auto;
      padding: 44px 54px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .header {
      background: rgba(255,255,255,0.94);
      border-radius: 24px;
      padding: 28px 32px;
      box-shadow: 0 18px 44px rgba(36, 113, 52, 0.12);
    }

    .title {
      font-size: 52px;
      font-weight: 900;
      color: #153b22;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 28px;
      color: #486250;
    }

    .table {
      flex: 1;
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      box-shadow: 0 18px 44px rgba(33, 99, 49, 0.12);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .table-head, .row {
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr 1fr;
      align-items: center;
    }

    .table-head {
      background: #193d28;
      color: #fff;
      font-size: 26px;
      font-weight: 800;
      padding: 22px 28px;
    }

    .rows {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
    }

    .row {
      font-size: 34px;
      padding: 28px;
      border-top: 1px solid #dbe9df;
    }

    .row:nth-child(odd) {
      background: #f7fcf8;
    }

    .label {
      font-weight: 900;
      color: #153b22;
    }

    .value {
      color: #20372a;
      text-align: right;
    }

    .delta.plus { color: #15803d; font-weight: 900; }
    .delta.minus { color: #dc2626; font-weight: 900; }
  </style>
</head>
<body>
  <div class="slide">
    <section class="header">
      <div class="title">前月末との比較</div>
      <div class="subtitle" id="subtitle">読み込み中...</div>
    </section>

    <section class="table">
      <div class="table-head">
        <div>銘柄</div>
        <div style="text-align:right;">前月末</div>
        <div style="text-align:right;">選択月末</div>
        <div style="text-align:right;">差分</div>
      </div>
      <div class="rows" id="rows"></div>
    </section>
  </div>

  <script>
    (async function init() {
      const monthId = ChaseData.getSelectedMonthId();
      const meta = ChaseData.getMonthMeta(monthId);
      const prevId = ChaseData.getPreviousMonthId(monthId);
      const currentDays = await ChaseData.loadMonthData(monthId).catch(() => []);
      const currentSummary = ChaseData.getMonthSummary(currentDays);
      const rows = document.getElementById('rows');

      if (!prevId) {
        document.getElementById('subtitle').textContent = `${meta.label} は比較用の前月データがありません`;
        rows.innerHTML = '<div class="row"><div class="label">比較不可</div><div class="value">-</div><div class="value">-</div><div class="value">-</div></div>';
        return;
      }

      const prevMeta = ChaseData.getMonthMeta(prevId);
      const prevDays = await ChaseData.loadMonthData(prevId).catch(() => []);
      const prevSummary = ChaseData.getMonthSummary(prevDays);
      const currentCumulative = await ChaseData.getCumulativeTradingDay(monthId).catch(() => null);
      const prevCumulative = await ChaseData.getCumulativeTradingDay(prevId).catch(() => null);
      if (!prevSummary || !currentSummary) {
        document.getElementById('subtitle').textContent = '比較用データを読み込めませんでした';
        rows.innerHTML = '<div class="row"><div class="label">読込失敗</div><div class="value">-</div><div class="value">-</div><div class="value">-</div></div>';
        return;
      }
      const subtitle = prevCumulative && currentCumulative
        ? `${prevMeta.label}（第${prevCumulative.start + 1}～${prevCumulative.end}営業日目）の月末と ${meta.label}（第${currentCumulative.start + 1}～${currentCumulative.end}営業日目）の月末を比較`
        : `${prevMeta.label} の月末と ${meta.label} の月末を比較`;
      document.getElementById('subtitle').textContent = subtitle;

      function row(label, prevValue, currentValue) {
        const delta = currentValue - prevValue;
        return `
          <div class="row">
            <div class="label">${label}</div>
            <div class="value">${ChaseData.formatYen(prevValue)}</div>
            <div class="value">${ChaseData.formatYen(currentValue)}</div>
            <div class="value delta ${delta >= 0 ? 'plus' : 'minus'}">${ChaseData.formatSignedYen(delta)}</div>
          </div>`;
      }

      rows.innerHTML = [
        row('楽天VT', prevSummary.vtEnd, currentSummary.vtEnd),
        row('レバナス', prevSummary.levanasEnd, currentSummary.levanasEnd),
      ].join('');
    })();
  </script>
</body>
</html>
