<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>投機信託ダービー</title>
  <link rel="stylesheet" href="./style_fhd.css" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    /* Script A: 期間設定 + DERBY_RACE_CONFIG 初期化（combined-from-arcs.js より先に実行） */
    (function () {
      const params = new URLSearchParams(window.location.search);
      const range = params.get('range') || 'all';
      const META = {
        '1m':  { title: '投機信託ダービー - 最新1ヶ月',   header: '最新1ヶ月レース' },
        '3m':  { title: '投機信託ダービー - 最新4半期',   header: '最新4半期レース' },
        'all': { title: '投機信託ダービー - 総集編 全期間', header: '総集編 全期間レース' },
      };
      const lbl = META[range] || META['all'];
      document.title = lbl.title;
      /* day0IsAccumulation は race-template.js のロード時に const として評価されるため
         ここで同期的にセットする。range=1m/3m では前月末(preRangeDay)を day 0 に
         据えるので、その日は積立なし → March 2等の積立がレース中のイベントになる。 */
      window.DERBY_RACE_CONFIG = {
        initialLotCount: 0,
        header: lbl.header,
        day0IsAccumulation: range === 'all',
      };
      window._derbyRange = range;
    })();
  </script>
  <script src="./combined-from-arcs.js"></script>
  <script>
    /* Script B: 期間フィルター
       カットオフ直前の最終営業日(preRangeDay)を day 0 として先頭に追加する。
       Script A で day0IsAccumulation=false を同期セット済みなので、
       day 0 は積立なし(=前月末の評価額) → day 1(=3/2等)で積立イベントが発火する。
       例) range=1m: day0=2/27(60,000円) → day1=3/2(積立↑70,000円・ピンク背景) */
    (function () {
      const range = window._derbyRange || 'all';
      if (range === 'all') return;

      document.addEventListener('derbyCombinedArcsLoaded', function filterRange() {
        document.removeEventListener('derbyCombinedArcsLoaded', filterRange);

        const combined   = window.derbyCombinedArcs;
        const accumDates = window.derbyAccumulationDates;
        if (!Array.isArray(combined) || !combined.length) return;

        const lastDate  = combined[combined.length - 1].date;
        const lastYear  = parseInt(lastDate.slice(0, 4), 10);
        const lastMonth = parseInt(lastDate.slice(4, 6), 10);

        /* カットオフ日を算出
           1m: 最終日から丸1ヶ月遡ったローリングウィンドウ
               例) 末尾=20260505 → cutoff="20260405"
           3m: 末尾月の2ヶ月前の月初（カレンダー3ヶ月分）
               例) 末尾=20260331 → cutoff="20260101" */
        let cutoff;
        if (range === '1m') {
          let cm = lastMonth - 1;
          let cy = lastYear;
          if (cm <= 0) { cm += 12; cy--; }
          cutoff = String(cy) + String(cm).padStart(2, '0') + lastDate.slice(6, 8);
        } else {
          let cm = lastMonth - 2;
          let cy = lastYear;
          while (cm <= 0) { cm += 12; cy--; }
          cutoff = String(cy) + String(cm).padStart(2, '0') + '01';
        }

        /* カットオフ直前の最終営業日を day 0（非積立）として先頭に追加。
           これにより最初の積立がレース中の最初のイベントとして可視化される。 */
        let preRangeDay = null;
        for (let i = combined.length - 1; i >= 0; i--) {
          if (combined[i].date < cutoff) { preRangeDay = combined[i]; break; }
        }
        const rangeDays = combined.filter(function (d) { return d.date >= cutoff; });
        window.derbyCombinedArcs = preRangeDay ? [preRangeDay].concat(rangeDays) : rangeDays;

        /* カットオフ前の積立回数 → initialLotCount として引き継ぎ */
        if (Array.isArray(accumDates)) {
          window.DERBY_RACE_CONFIG.initialLotCount =
            accumDates.filter(function (d) { return d < cutoff; }).length;
          window.derbyAccumulationDates =
            accumDates.filter(function (d) { return d >= cutoff; });
        }
      });
    })();
  </script>
  <style>
    body {
      display: block !important;
      min-height: 100vh;
      height: auto !important;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      overflow: auto;
      background: #fff !important;
    }

    /* Force this slide to FHD (1920x1080) for generation/cropping */
    .slide.compact {
      width: 1920px !important;
      height: 1080px !important;
      max-width: none !important;
      margin: 0 !important;
      box-sizing: border-box;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    #slide-stage {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
    }

    #slide-stage .slide.compact {
      transform-origin: top left;
      will-change: transform;
    }
    /* Ensure content fills the slide height */
    .slide.compact .content {
      height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      box-sizing: border-box;
    }
    /* Layout tweaks: padding, larger fonts and spacing for FHD */
    .slide.compact { font-size: 24px; }
    .slide.compact .content { padding: 28px 48px !important; gap: 18px; }
    .header { font-size: 48px; font-weight: 800; padding: 8px 0; }
    .controls { margin-bottom: 18px; }
    .controls .control-button { font-size: 20px; padding: 8px 14px; }

    /* Give main visualization a larger stable height inside FHD */
    #race-chart { height: 650px; align-self: stretch; flex: 1 1 auto; }
    /* Make cockpit same height as the chart and wider for readability; override inline width */
    .race-cockpit { height: 650px !important; align-self: stretch !important; width: 520px !important; flex: 0 0 520px !important; overflow: auto; padding-left: 24px !important; }
    /* Ensure the parent flex row stretches children to equal height even if inline style sets align-items */
    .slide.compact .content > div[style*="display:flex"] { align-items: stretch !important; }

    /* Cockpit font sizing overrides (use !important to beat inline styles) */
    .race-cockpit { font-size:24px !important; }
    .race-cockpit .cockpit-header h3 { margin:0; font-size:32px !important; }
    .race-cockpit .date-display, .race-cockpit .cockpit-header .date-display { font-size:24px !important; }
    .race-cockpit div, .race-cockpit > div > div { font-size:24px !important; }
    #cockpit-date { font-size:28px !important; color:#444 !important; }
    #total-value { font-size:48px !important; font-weight:800 !important; }
    #leader-name, #best-category { font-size:32px !important; font-weight:700 !important; }
    #baseline-value { font-size:24px !important; }

    /* Chart text sizing */
    .bar .lbl { font-size: 32px !important; font-weight: bold; }
    .bar .val { font-size: 32px !important; font-weight: bold; }
    .goal-text { font-size: 24px !important; font-weight: bold; }
    .date-label { font-size: 36px !important; font-weight: bold; }

    /* Race header label */
    #race-header {
      font-size: 32px !important;
      font-weight: 800;
      color: #4a69bd;
      margin-right: 20px;
      vertical-align: middle;
    }

    /* Back link styled as control button */
    a.control-button {
      display: inline-block;
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
<body>
  <div id="slide-stage">
    <div class="slide compact">
      <div class="content" id="main-content" style="flex-direction:column;transition:background-color 0.3s ease;">
      <div class="controls" style="margin-bottom:10px;">
        <span id="race-header"></span>
        <a href="./index.html" class="control-button">← 一覧へ</a>
        <button class="control-button" id="play-btn">Play</button>
        <button class="control-button" id="pause-btn">Pause</button>
        <button class="control-button" id="reset-btn">Reset</button>
        <select id="start-date-select" class="control-button"><option value="">開始日を選択...</option></select>
        <button class="control-button" id="fullscreen-btn">全画面</button>
  <label>速度 <input type="range" id="speed" min="100" max="1500" value="400" /></label>
  <span id="accumulation-indicator" style="margin-left:15px;font-weight:700;color:#e84393;font-size:16px;display:none;">💰 積立中...</span>
      </div>
      <div style="display:flex;gap:16px;align-items:flex-start;">
        <div id="race-chart" style="flex:1; width:100%;"></div>
        <div class="race-cockpit" style="width:260px;">
          <div class="cockpit-header"><h3 style="margin:0 0 8px 0;">ダービー コックピット</h3>
            <div class="date-display" id="cockpit-date">ndo-</div>
          </div>
          <div style="margin-top:8px;">
            <div style="margin-bottom:8px;"><div style="font-size:12px;color:#666">総資産</div><div id="total-value" style="font-size:18px;font-weight:700">-</div><div id="total-change" style="font-size:12px;color:#080">-</div></div>
            <div style="margin-bottom:8px;"><div style="font-size:12px;color:#666">首位</div><div id="leader-name" style="font-size:16px;font-weight:700">-</div><div id="leader-change" style="font-size:12px;color:#080">-</div></div>
            <div style="margin-bottom:8px;"><div style="font-size:12px;color:#666">最強カテゴリ</div><div id="best-category" style="font-size:14px;font-weight:700">-</div><div id="best-category-change" style="font-size:12px;color:#080">-</div></div>
            <div style="margin-top:10px;border-top:1px solid #eee;padding-top:8px;"><div style="font-size:12px;color:#666">買い付け金額</div><div id="baseline-value" style="font-size:14px;font-weight:700">- 円</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>
<script>
  (function () {
    const stage = document.getElementById("slide-stage");
    const slide = stage ? stage.querySelector(".slide.compact") : null;
    if (!stage || !slide) return;
    const baseW = 1920;
    const baseH = 1080;
    const padding = 16;

    function fitSlideToViewport() {
      const availableW = Math.max(320, window.innerWidth - padding * 2);
      const availableH = Math.max(320, window.innerHeight - padding * 2);
      const scale = Math.min(availableW / baseW, availableH / baseH, 1);

      stage.style.width = `${Math.floor(baseW * scale)}px`;
      stage.style.height = `${Math.floor(baseH * scale)}px`;
      slide.style.transform = `scale(${scale})`;
    }

    window.addEventListener("resize", fitSlideToViewport);
    document.addEventListener("fullscreenchange", fitSlideToViewport);
    document.addEventListener("webkitfullscreenchange", fitSlideToViewport);
    fitSlideToViewport();
  })();
</script>
<script src="./race-template.js"></script>
<script>
  /* Script C: 開始日ドロップダウン
     race-template.js の derbyCombinedArcsLoaded リスナーより後に登録されるため、
     このリスナーが実行される時点で window.derbyRace は確実にセット済み。 */
  (function () {
    function populateStartDateDropdown() {
      const sel = document.getElementById('start-date-select');
      if (!sel) return;

      const combined   = window.derbyCombinedArcs;
      const accumDates = window.derbyAccumulationDates;
      if (!Array.isArray(combined) || !Array.isArray(accumDates)) return;

      /* date → index マップを構築 */
      const dateToIndex = {};
      combined.forEach(function (d, i) { dateToIndex[d.date] = i; });

      /* 既存 option（プレースホルダー以外）をクリア */
      while (sel.options.length > 1) sel.remove(1);

      /* 積立日のみをオプションとして追加 */
      accumDates.forEach(function (d) {
        if (!(d in dateToIndex)) return;
        const opt = document.createElement('option');
        opt.value = String(dateToIndex[d]);
        /* YYYYMMDD → YYYY/MM/DD */
        opt.textContent = d.slice(0, 4) + '/' + d.slice(4, 6) + '/' + d.slice(6, 8);
        sel.appendChild(opt);
      });

      sel.addEventListener('change', function () {
        if (sel.value === '') return;
        const idx = parseInt(sel.value, 10);
        if (window.derbyRace && !isNaN(idx)) {
          window.derbyRace.seekTo(idx);
        }
        /* プレースホルダーに戻す */
        sel.value = '';
      });
    }

    document.addEventListener('derbyCombinedArcsLoaded', function onLoaded() {
      document.removeEventListener('derbyCombinedArcsLoaded', onLoaded);
      populateStartDateDropdown();
    });

    /* イベント取りこぼし対策 */
    if (Array.isArray(window.derbyCombinedArcs) && window.derbyCombinedArcs.length) {
      populateStartDateDropdown();
    }
  })();
</script>
</body>
</html>
