<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>VT Chase - 月次サマリー</title>
  <link rel="stylesheet" href="./style_fhd.css" />
  <script src="./chase-utils.js"></script>
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #eef4ff 0%, #d7e4ff 100%);
      font-family: 'Noto Sans JP', sans-serif;
    }

    .slide {
      width: 1920px;
      height: 1080px;
      margin: 0 auto;
      padding: 44px 54px;
      box-sizing: border-box;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .hero {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 24px;
      padding: 34px 40px;
      box-shadow: 0 18px 50px rgba(31, 60, 136, 0.12);
    }

    .eyebrow {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #4a69bd;
      margin-bottom: 12px;
    }

    .title {
      font-size: 56px;
      font-weight: 900;
      color: #1d2b53;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 28px;
      color: #4f5d7a;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 1.1fr 0.8fr;
      gap: 22px;
      flex: 1;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 28px 32px;
      box-shadow: 0 16px 40px rgba(25, 48, 97, 0.1);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card.vt { border-top: 10px solid #3498db; }
    .card.lev { border-top: 10px solid #e84393; }

    .card-title {
      font-size: 34px;
      font-weight: 900;
      color: #20304d;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid #e3ebfb;
      padding-bottom: 12px;
    }

    .metric-label {
      font-size: 22px;
      color: #6b7691;
    }

    .metric-value {
      font-size: 32px;
      font-weight: 800;
      color: #1d2b53;
    }

    .delta {
      font-size: 28px;
      font-weight: 900;
    }

    .delta.plus { color: #15803d; }
    .delta.minus { color: #dc2626; }

    .facts {
      display: grid;
      gap: 18px;
    }

    .fact-box {
      background: linear-gradient(180deg, #1d2b53 0%, #294381 100%);
      color: #fff;
      border-radius: 22px;
      padding: 24px 26px;
    }

    .fact-label {
      font-size: 22px;
      opacity: 0.8;
      margin-bottom: 8px;
    }

    .fact-value {
      font-size: 40px;
      font-weight: 900;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <div class="slide">
    <section class="hero">
      <div class="eyebrow" id="month-label">VT Chase</div>
      <div class="title">選択月の月次サマリー</div>
      <div class="subtitle" id="range-label">読み込み中...</div>
    </section>

    <section class="grid">
      <article class="card vt">
        <div class="card-title">楽天VT</div>
        <div class="metric"><span class="metric-label">月初</span><span class="metric-value" id="vt-start">-</span></div>
        <div class="metric"><span class="metric-label">月末</span><span class="metric-value" id="vt-end">-</span></div>
        <div class="metric"><span class="metric-label">月間差</span><span class="delta" id="vt-delta">-</span></div>
      </article>

      <article class="card lev">
        <div class="card-title">レバナス</div>
        <div class="metric"><span class="metric-label">月初</span><span class="metric-value" id="lev-start">-</span></div>
        <div class="metric"><span class="metric-label">月末</span><span class="metric-value" id="lev-end">-</span></div>
        <div class="metric"><span class="metric-label">月間差</span><span class="delta" id="lev-delta">-</span></div>
      </article>

      <aside class="facts">
        <div class="fact-box">
          <div class="fact-label">営業日数</div>
          <div class="fact-value" id="trading-days">-</div>
        </div>
        <div class="fact-box">
          <div class="fact-label">月末の差</div>
          <div class="fact-value" id="gap-end">-</div>
        </div>
        <div class="fact-box">
          <div class="fact-label">データ最終日</div>
          <div class="fact-value" id="end-date">-</div>
        </div>
      </aside>
    </section>
  </div>

  <script>
    (async function init() {
      const monthId = ChaseData.getSelectedMonthId();
      const meta = ChaseData.getMonthMeta(monthId);
      const days = await ChaseData.loadMonthData(monthId).catch(() => []);
      const summary = ChaseData.getMonthSummary(days);
      const cumulative = await ChaseData.getCumulativeTradingDay(monthId).catch(() => null);
      if (!summary) {
        document.getElementById('month-label').textContent = `VT Chase | ${meta.label}`;
        document.getElementById('range-label').textContent = 'データを読み込めませんでした';
        return;
      }

      const vtDelta = document.getElementById('vt-delta');
      const levDelta = document.getElementById('lev-delta');
      document.getElementById('month-label').textContent = `VT Chase | ${meta.label}`;
      const rangeText = cumulative 
        ? `${ChaseData.formatDate(summary.startDate)} から ${ChaseData.formatDate(summary.endDate)} （第 ${cumulative.start + 1} 営業日目〜第 ${cumulative.end} 営業日目）`
        : `${ChaseData.formatDate(summary.startDate)} から ${ChaseData.formatDate(summary.endDate)} までの推移`;
      document.getElementById('range-label').textContent = rangeText;
      document.getElementById('vt-start').textContent = ChaseData.formatYen(summary.vtStart);
      document.getElementById('vt-end').textContent = ChaseData.formatYen(summary.vtEnd);
      document.getElementById('lev-start').textContent = ChaseData.formatYen(summary.levanasStart);
      document.getElementById('lev-end').textContent = ChaseData.formatYen(summary.levanasEnd);
      vtDelta.textContent = ChaseData.formatSignedYen(summary.vtChange);
      levDelta.textContent = ChaseData.formatSignedYen(summary.levanasChange);
      vtDelta.className = `delta ${summary.vtChange >= 0 ? 'plus' : 'minus'}`;
      levDelta.className = `delta ${summary.levanasChange >= 0 ? 'plus' : 'minus'}`;
      document.getElementById('trading-days').textContent = `${summary.tradingDays}日`;
      document.getElementById('gap-end').textContent = ChaseData.formatYen(summary.gapEnd);
      document.getElementById('end-date').textContent = ChaseData.formatDate(summary.endDate);
    })();
  </script>
</body>
</html>
